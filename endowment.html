<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yale Endowment | Simulador de Aposentadoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['Outfit', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        'midnight': '#0a0e17',
                        'deep': '#111827',
                        'surface': '#1a2234',
                        'accent': '#10b981',
                        'accent-dim': '#059669',
                        'danger': '#ef4444',
                        'warning': '#f59e0b',
                        'info': '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        * { scrollbar-width: thin; scrollbar-color: #8b5cf6 #1a2234; }
        *::-webkit-scrollbar { width: 6px; }
        *::-webkit-scrollbar-track { background: #1a2234; }
        *::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 3px; }
        .gradient-border { background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 50%, #10b981 100%); padding: 1px; }
        .gradient-border-inner { background: #1a2234; }
        .stat-glow { box-shadow: 0 0 40px rgba(139, 92, 246, 0.15); }
        .input-focus:focus { box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3); }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .chart-container { position: relative; height: 300px; }
    </style>
</head>
<body class="bg-midnight text-gray-100 font-display min-h-screen">
    <div id="root"></div>

    <script src="js/rng.js"></script>
    <script src="js/engine-core.js"></script>
    <script src="js/engine-endowment.js"></script>
    <script type="text/babel" src="js/ui-primitives.js"></script>
    <script type="text/babel" src="js/ui-shared-charts.js"></script>
    <script type="text/babel" src="js/ui-endowment.js"></script>
    <script type="text/babel" src="js/app-endowment.js"></script>
</body>
</html>
