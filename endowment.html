<body class="bg-midnight text-gray-100 font-display min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ============================================
        // SEEDED PSEUDO-RANDOM NUMBER GENERATOR
        // ============================================
        class SeededRNG {
            constructor(seed) {
                this.state = seed >>> 0;
            }
            next() {
                let t = this.state += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
            getState() { return this.state; }
        }

        // ============================================
        // MONTE CARLO ENGINE
        // ============================================
        class MonteCarloEngine {
            constructor(params) {
                this.params = params;
                const seed = params.seed !== undefined ? params.seed : Math.floor(Math.random() * 2147483647);
                this.rng = new SeededRNG(seed);
                this.initialSeed = seed;
            }

            getSeed() { return this.initialSeed; }
            random() { return this.rng.next(); }

            randomNormal(mean = 0, std = 1) {
                const u1 = this.random();
                const u2 = this.random();
                const z0 = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
                return z0 * std + mean;
            }

            randomStudentT(mean, std, df) {
                const z = this.randomNormal(0, 1);
                let chiSquared = 0;
                for (let i = 0; i < df; i++) {
                    const n = this.randomNormal(0, 1);
                    chiSquared += n * n;
                }
                const scaleFactor = df > 2 ? Math.sqrt((df - 2) / df) : 1;
                const t = z / Math.sqrt(chiSquared / df) * scaleFactor;
                return mean + std * t;
            }

            generateReturn(mean, std) {
                if (this.params.useStudentT) {
                    return this.randomStudentT(mean, std, this.params.degreesOfFreedom);
                }
                return this.randomNormal(mean, std);
            }

            generateIPCA(equityReturn) {
                if (!this.params.useIPCAModel) {
                    return this.params.inflation / 100;
                }
                const baseIPCA = this.params.expectedIPCA / 100;
                const ipcaVol = this.params.ipcaVolatility / 100;
                const equityMean = this.params.equityReturn / 100;
                const equityVol = this.params.equityVolatility / 100;
                const correlatedShock = -0.2 * (equityReturn - equityMean) / equityVol;
                const randomShock = this.randomNormal(0, ipcaVol);
                const ipca = Math.max(0, Math.min(0.15, baseIPCA + correlatedShock * ipcaVol + randomShock));
                return ipca;
            }

            generateBondReturn(ipca) {
                if (!this.params.useIPCAModel) {
                    return this.generateReturn(this.params.bondReturn / 100, this.params.bondVolatility / 100);
                }
                const realSpread = this.params.realSpread / 100;
                const spreadVariation = this.randomNormal(0, 0.005);
                return ipca + realSpread + spreadVariation;
            }

            getDynamicCorrelation(equityReturn) {
                if (!this.params.useDynamicCorrelation) {
                    return this.params.baseCorrelation;
                }
                const baseCorr = this.params.baseCorrelation;
                const stressMult = this.params.stressCorrelationMultiplier;
                const equityMean = this.params.equityReturn / 100;
                const equityVol = this.params.equityVolatility / 100;
                const zScore = (equityReturn - equityMean) / equityVol;
                if (zScore < -1) {
                    const stressFactor = Math.min(Math.abs(zScore) - 1, 2) / 2;
                    return Math.max(-0.9, baseCorr * (1 + stressFactor * (stressMult - 1)));
                } else if (zScore > 1) {
                    const boomFactor = Math.min(zScore - 1, 2) / 2;
                    return baseCorr * (1 - boomFactor * 0.5);
                }
                return baseCorr;
            }

            calculateTax(withdrawalUSD, gainRatio, bondAllocation) {
                if (!this.params.useTaxModel) return 0;
                const equityWithdrawal = withdrawalUSD * (1 - bondAllocation);
                const bondWithdrawal = withdrawalUSD * bondAllocation;
                const equityTax = equityWithdrawal * gainRatio * (this.params.equityTaxRate / 100);
                const bondTax = bondWithdrawal * gainRatio * (this.params.fixedIncomeTaxRate / 100);
                return equityTax + bondTax;
            }

            generateCorrelatedReturns(correlation) {
                const z1 = this.randomNormal();
                const z2 = this.randomNormal();
                const correlatedZ2 = correlation * z1 + Math.sqrt(1 - correlation * correlation) * z2;
                return [z1, correlatedZ2];
            }

            simulateCurrency(equityReturn, baseFX, volatilityFX = 0.15) {
                const correlation = this.getDynamicCorrelation(equityReturn);
                const [_, fxShock] = this.generateCorrelatedReturns(correlation);
                const meanFX = this.params.initialFX;
                const reversionSpeed = 0.1;
                const drift = reversionSpeed * (meanFX - baseFX) / meanFX;
                const stressMultiplier = equityReturn < 0 ? 1.3 : 1.0;
                const fxReturn = drift + fxShock * volatilityFX * stressMultiplier;
                return baseFX * (1 + fxReturn);
            }

            applyGuytonKlinger(currentWithdrawal, portfolioValue, initialWithdrawalRate, previousReturn, inflation) {
                const { useGuytonKlinger, preservationThreshold, prosperityThreshold, adjustmentPercent, applyInflationRule } = this.params;
                if (!useGuytonKlinger) {
                    return { withdrawal: currentWithdrawal * (1 + inflation), ruleApplied: null, inflationApplied: true };
                }
                const currentRate = currentWithdrawal / portfolioValue;
                let newWithdrawal = currentWithdrawal;
                let ruleApplied = null;
                let inflationApplied = true;
                if (applyInflationRule && previousReturn < 0) {
                    ruleApplied = 'inflation_skip';
                    inflationApplied = false;
                } else {
                    newWithdrawal *= (1 + inflation);
                }
                if (currentRate > initialWithdrawalRate * (1 + preservationThreshold)) {
                    newWithdrawal *= (1 - adjustmentPercent);
                    ruleApplied = 'preservation';
                } else if (currentRate < initialWithdrawalRate * (1 - prosperityThreshold)) {
                    newWithdrawal *= (1 + adjustmentPercent);
                    ruleApplied = 'prosperity';
                }
                return { withdrawal: newWithdrawal, ruleApplied, inflationApplied };
            }

            runSimulation() {
                const {
                    initialPortfolioUSD, initialPortfolioBRL, initialFX, withdrawalRate,
                    equityReturn, equityVolatility, bondReturn, bondVolatility, inflation, years,
                    tentInitialBondPercent, tentDuration, targetBondPercent,
                    useBucketStrategy, bucketYears, useMinimumWithdrawal, minimumWithdrawalBRL
                } = this.params;

                let portfolioUSD = initialPortfolioUSD;
                let currentFX = initialFX;
                let portfolioBRLFixed = initialPortfolioBRL;
                let portfolioBRL = portfolioUSD * currentFX + portfolioBRLFixed;
                let bondAllocation = tentInitialBondPercent / 100;
                let equityAllocation = 1 - bondAllocation;
                let bondPortionUSD = portfolioUSD * bondAllocation;
                let equityPortionUSD = portfolioUSD * equityAllocation;
                const totalInitialPortfolioBRL = portfolioUSD * initialFX + initialPortfolioBRL;
                const initialWithdrawalBRL = totalInitialPortfolioBRL * (withdrawalRate / 100);
                let currentWithdrawalUSD = initialWithdrawalBRL / initialFX;
                const initialWithdrawalRate = withdrawalRate / 100;
                let previousReturn = 0;
                let consecutiveNegativeYears = 0;
                let inStressPeriod = false;
                let currentStressStart = null;
                let currentStressExtraWithdrawn = 0;

                const history = {
                    portfolioUSD: [portfolioUSD],
                    portfolioBRL: [portfolioBRL],
                    withdrawalBRL: [currentWithdrawalUSD * currentFX],
                    withdrawalUSD: [currentWithdrawalUSD],
                    recommendedWithdrawalBRL: [currentWithdrawalUSD * currentFX],
                    fxRate: [currentFX],
                    bondAllocation: [bondAllocation * 100],
                    rulesApplied: [null],
                    minimumEnforced: [false],
                    failed: false, failureYear: null, failureType: null, failureCause: null,
                    stressPeriods: [],
                    yearlyStressData: [{ minimumEnforced: false, extraWithdrawn: 0, percentExtra: 0 }],
                    withdrawalSource: ['initial']
                };

                for (let year = 1; year <= years; year++) {
                    if (history.failed) {
                        history.portfolioUSD.push(0);
                        history.portfolioBRL.push(0);
                        history.withdrawalBRL.push(0);
                        history.withdrawalUSD.push(0);
                        history.recommendedWithdrawalBRL.push(0);
                        history.fxRate.push(currentFX);
                        history.bondAllocation.push(0);
                        history.rulesApplied.push(null);
                        history.minimumEnforced.push(false);
                        history.yearlyStressData.push({ minimumEnforced: false, extraWithdrawn: 0, percentExtra: 0 });
                        history.withdrawalSource.push('none');
                        continue;
                    }

                    let equityReturnYear = this.generateReturn(equityReturn / 100, equityVolatility / 100);

                    if (this.params.useSequenceConstraint) {
                        if (equityReturnYear < 0) {
                            consecutiveNegativeYears++;
                            if (consecutiveNegativeYears >= this.params.maxNegativeSequence) {
                                equityReturnYear = this.random() * 0.10;
                                consecutiveNegativeYears = 0;
                            }
                        } else {
                            consecutiveNegativeYears = 0;
                        }
                    }

                    const ipcaYear = this.generateIPCA(equityReturnYear);
                    const bondReturnYear = this.generateBondReturn(ipcaYear);
                    portfolioBRLFixed *= (1 + bondReturnYear);
                    currentFX = this.simulateCurrency(equityReturnYear, currentFX);
                    const gainRatio = Math.min(0.6, year * 0.06);
                    const minimumWithdrawalUSD = useMinimumWithdrawal && minimumWithdrawalBRL > 0 ? minimumWithdrawalBRL / currentFX : 0;

                    let withdrawalSource = 'mixed';
                    let recommendedWithdrawalUSD = currentWithdrawalUSD;
                    let actualWithdrawalUSD = currentWithdrawalUSD;
                    let gkRuleApplied = null;
                    let taxPaid = 0;

                    if (useBucketStrategy && year <= bucketYears) {
                        equityPortionUSD *= (1 + equityReturnYear);
                        bondPortionUSD *= (1 + bondReturnYear);
                        withdrawalSource = 'bonds';
                        const totalPortfolioUSD = equityPortionUSD + bondPortionUSD;
                        const gkResult = this.applyGuytonKlinger(currentWithdrawalUSD, totalPortfolioUSD, initialWithdrawalRate, previousReturn, inflation / 100);
                        recommendedWithdrawalUSD = gkResult.withdrawal;
                        gkRuleApplied = gkResult.ruleApplied;
                        actualWithdrawalUSD = useMinimumWithdrawal ? Math.max(recommendedWithdrawalUSD, minimumWithdrawalUSD) : recommendedWithdrawalUSD;
                        taxPaid = this.calculateTax(actualWithdrawalUSD, gainRatio, bondAllocation);
                        const totalWithdrawalUSD = actualWithdrawalUSD + taxPaid;
                        bondPortionUSD -= totalWithdrawalUSD;
                        if (bondPortionUSD < 0) {
                            equityPortionUSD += bondPortionUSD;
                            bondPortionUSD = 0;
                            withdrawalSource = 'equity_forced';
                        }
                        portfolioUSD = equityPortionUSD + bondPortionUSD;
                        bondAllocation = portfolioUSD > 0 ? bondPortionUSD / portfolioUSD : 0;
                        equityAllocation = 1 - bondAllocation;
                        currentWithdrawalUSD = recommendedWithdrawalUSD;
                    } else {
                        if (year <= tentDuration) {
                            bondAllocation = tentInitialBondPercent / 100;
                        } else {
                            const transitionYears = 3;
                            const transitionProgress = Math.min(1, (year - tentDuration) / transitionYears);
                            bondAllocation = tentInitialBondPercent / 100 - (tentInitialBondPercent / 100 - targetBondPercent / 100) * transitionProgress;
                        }
                        equityAllocation = 1 - bondAllocation;
                        const portfolioReturn = equityAllocation * equityReturnYear + bondAllocation * bondReturnYear;
                        portfolioUSD *= (1 + portfolioReturn);
                        bondPortionUSD = portfolioUSD * bondAllocation;
                        equityPortionUSD = portfolioUSD * equityAllocation;
                        const currentEquityPercent = equityPortionUSD / portfolioUSD;
                        const targetEquityPercent = equityAllocation;
                        const rebalanceThreshold = 0.10;
                        let preferEquityWithdrawal = false;
                        if (equityReturnYear > 0.15 && currentEquityPercent > targetEquityPercent + rebalanceThreshold) {
                            preferEquityWithdrawal = true;
                            withdrawalSource = 'equity_rebalance';
                        }
                        const gkResult = this.applyGuytonKlinger(currentWithdrawalUSD, portfolioUSD, initialWithdrawalRate, previousReturn, inflation / 100);
                        recommendedWithdrawalUSD = gkResult.withdrawal;
                        gkRuleApplied = gkResult.ruleApplied;
                        actualWithdrawalUSD = useMinimumWithdrawal ? Math.max(recommendedWithdrawalUSD, minimumWithdrawalUSD) : recommendedWithdrawalUSD;
                        taxPaid = this.calculateTax(actualWithdrawalUSD, gainRatio, bondAllocation);
                        const totalWithdrawalUSD = actualWithdrawalUSD + taxPaid;
                        if (preferEquityWithdrawal) {
                            const maxEquityWithdrawal = Math.max(0, equityPortionUSD - portfolioUSD * targetEquityPercent);
                            const equityWithdrawal = Math.min(totalWithdrawalUSD, maxEquityWithdrawal);
                            const bondWithdrawal = totalWithdrawalUSD - equityWithdrawal;
                            equityPortionUSD -= equityWithdrawal;
                            bondPortionUSD -= bondWithdrawal;
                            portfolioUSD = equityPortionUSD + bondPortionUSD;
                        } else {
                            portfolioUSD -= totalWithdrawalUSD;
                        }
                        currentWithdrawalUSD = recommendedWithdrawalUSD;
                        previousReturn = portfolioReturn;
                    }

                    const actualWithdrawalBRL = actualWithdrawalUSD * currentFX;
                    const recommendedWithdrawalBRL = recommendedWithdrawalUSD * currentFX;
                    const minimumWasEnforced = useMinimumWithdrawal && minimumWithdrawalBRL > 0 && actualWithdrawalUSD > recommendedWithdrawalUSD * 1.001;
                    const extraWithdrawnBRL = minimumWasEnforced ? actualWithdrawalBRL - recommendedWithdrawalBRL : 0;
                    const percentExtra = minimumWasEnforced && recommendedWithdrawalBRL > 0 ? (extraWithdrawnBRL / recommendedWithdrawalBRL) * 100 : 0;

                    history.yearlyStressData.push({ minimumEnforced: minimumWasEnforced, extraWithdrawn: extraWithdrawnBRL, percentExtra });

                    if (minimumWasEnforced && !inStressPeriod) {
                        inStressPeriod = true; currentStressStart = year; currentStressExtraWithdrawn = extraWithdrawnBRL;
                    } else if (minimumWasEnforced && inStressPeriod) {
                        currentStressExtraWithdrawn += extraWithdrawnBRL;
                    } else if (!minimumWasEnforced && inStressPeriod) {
                        history.stressPeriods.push({ startYear: currentStressStart, endYear: year - 1, duration: year - currentStressStart, totalExtraWithdrawn: currentStressExtraWithdrawn, recovered: true, recoveryYear: year });
                        inStressPeriod = false; currentStressStart = null; currentStressExtraWithdrawn = 0;
                    }

                    if (portfolioUSD <= 0) {
                        if (inStressPeriod) {
                            history.stressPeriods.push({ startYear: currentStressStart, endYear: year, duration: year - currentStressStart + 1, totalExtraWithdrawn: currentStressExtraWithdrawn + extraWithdrawnBRL, recovered: false, recoveryYear: null });
                            inStressPeriod = false;
                        }
                        history.failed = true; history.failureYear = year; history.failureType = 'depletion';
                        history.failureCause = this.analyzeFailure(previousReturn, equityReturnYear, currentFX, bondAllocation, minimumWasEnforced);
                        portfolioUSD = 0;
                    }

                    portfolioBRL = portfolioUSD * currentFX + portfolioBRLFixed;
                    history.portfolioUSD.push(portfolioUSD);
                    history.portfolioBRL.push(portfolioBRL);
                    history.withdrawalBRL.push(actualWithdrawalBRL);
                    history.withdrawalUSD.push(actualWithdrawalUSD);
                    history.recommendedWithdrawalBRL.push(recommendedWithdrawalBRL);
                    history.fxRate.push(currentFX);
                    history.bondAllocation.push(bondAllocation * 100);
                    history.rulesApplied.push(gkRuleApplied);
                    history.minimumEnforced.push(minimumWasEnforced);
                    history.withdrawalSource.push(withdrawalSource);
                }

                if (inStressPeriod && !history.failed) {
                    history.stressPeriods.push({ startYear: currentStressStart, endYear: years, duration: years - currentStressStart + 1, totalExtraWithdrawn: currentStressExtraWithdrawn, recovered: false, recoveryYear: null });
                }
                return history;
            }

            analyzeFailure(prevReturn, currentReturn, fx, bondAlloc, minimumEnforced) {
                const causes = [];
                if (minimumEnforced) causes.push('Saque mínimo forçado acelerou depleção');
                if (prevReturn < -0.15) causes.push('Queda severa no ano anterior');
                if (currentReturn < -0.20) causes.push('Crash de mercado');
                if (fx > this.params.initialFX * 1.3) causes.push('Desvalorização cambial extrema');
                if (bondAlloc < 0.15) causes.push('Baixa proteção em renda fixa');
                return causes.length > 0 ? causes : ['Sequência prolongada de retornos negativos'];
            }

            runMonteCarlo(iterations) {
                const results = [];
                for (let i = 0; i < iterations; i++) results.push(this.runSimulation());
                return this.analyzeResults(results);
            }

            analyzeResults(simulations) {
                const years = this.params.years;
                const numSims = simulations.length;
                const { minimumWithdrawalBRL, useMinimumWithdrawal } = this.params;

                const percentiles = { p10: [], p25: [], p50: [], p75: [], p90: [] };
                const withdrawalPercentiles = { p10: [], p25: [], p50: [], p75: [], p90: [] };
                const withdrawalMeans = [];
                const withdrawalMedians = [];
                const recommendedWithdrawalMeans = [];
                const stressChartData = { p10: [], p25: [], p50: [], p75: [], p90: [], mean: [], percentMinimumEnforced: [] };

                for (let year = 0; year <= years; year++) {
                    const portfolioValues = simulations.map(s => s.portfolioBRL[year] || 0).sort((a, b) => a - b);
                    const withdrawalValues = simulations.map(s => s.withdrawalBRL[year] || 0).sort((a, b) => a - b);
                    const nonZeroWithdrawals = withdrawalValues.filter(w => w > 0);
                    const recommendedValues = simulations.map(s => s.recommendedWithdrawalBRL ? s.recommendedWithdrawalBRL[year] || 0 : 0).filter(w => w > 0);

                    percentiles.p10.push(portfolioValues[Math.floor(numSims * 0.10)]);
                    percentiles.p25.push(portfolioValues[Math.floor(numSims * 0.25)]);
                    percentiles.p50.push(portfolioValues[Math.floor(numSims * 0.50)]);
                    percentiles.p75.push(portfolioValues[Math.floor(numSims * 0.75)]);
                    percentiles.p90.push(portfolioValues[Math.floor(numSims * 0.90)]);

                    withdrawalPercentiles.p10.push(withdrawalValues[Math.floor(numSims * 0.10)]);
                    withdrawalPercentiles.p25.push(withdrawalValues[Math.floor(numSims * 0.25)]);
                    withdrawalPercentiles.p50.push(withdrawalValues[Math.floor(numSims * 0.50)]);
                    withdrawalPercentiles.p75.push(withdrawalValues[Math.floor(numSims * 0.75)]);
                    withdrawalPercentiles.p90.push(withdrawalValues[Math.floor(numSims * 0.90)]);

                    const mean = nonZeroWithdrawals.length > 0 ? nonZeroWithdrawals.reduce((a, b) => a + b, 0) / nonZeroWithdrawals.length : 0;
                    const median = nonZeroWithdrawals.length > 0 ? nonZeroWithdrawals[Math.floor(nonZeroWithdrawals.length / 2)] : 0;
                    withdrawalMeans.push(mean);
                    withdrawalMedians.push(median);

                    const recommendedMean = recommendedValues.length > 0 ? recommendedValues.reduce((a, b) => a + b, 0) / recommendedValues.length : 0;
                    recommendedWithdrawalMeans.push(recommendedMean);

                    if (useMinimumWithdrawal && minimumWithdrawalBRL > 0) {
                        const percentExtraValues = simulations.map(s => s.yearlyStressData[year]?.percentExtra || 0).sort((a, b) => a - b);
                        const minimumEnforcedCount = simulations.filter(s => s.yearlyStressData[year]?.minimumEnforced).length;
                        stressChartData.p10.push(percentExtraValues[Math.floor(numSims * 0.10)]);
                        stressChartData.p25.push(percentExtraValues[Math.floor(numSims * 0.25)]);
                        stressChartData.p50.push(percentExtraValues[Math.floor(numSims * 0.50)]);
                        stressChartData.p75.push(percentExtraValues[Math.floor(numSims * 0.75)]);
                        stressChartData.p90.push(percentExtraValues[Math.floor(numSims * 0.90)]);
                        stressChartData.mean.push(percentExtraValues.reduce((a, b) => a + b, 0) / numSims);
                        stressChartData.percentMinimumEnforced.push((minimumEnforcedCount / numSims) * 100);
                    }
                }

                const allStressPeriods = simulations.flatMap(s => s.stressPeriods);
                const stressDurations = allStressPeriods.map(sp => sp.duration).sort((a, b) => a - b);
                const durationAnalysis = {
                    count: allStressPeriods.length,
                    simsWithStress: simulations.filter(s => s.stressPeriods.length > 0).length,
                    avgDuration: stressDurations.length > 0 ? stressDurations.reduce((a, b) => a + b, 0) / stressDurations.length : 0,
                    medianDuration: stressDurations.length > 0 ? stressDurations[Math.floor(stressDurations.length / 2)] : 0,
                    maxDuration: stressDurations.length > 0 ? Math.max(...stressDurations) : 0,
                    minDuration: stressDurations.length > 0 ? Math.min(...stressDurations) : 0,
                    distribution: {}
                };
                stressDurations.forEach(d => { durationAnalysis.distribution[d] = (durationAnalysis.distribution[d] || 0) + 1; });

                const toleranceSuccessRates = [];
                for (let tolerance = 0; tolerance <= 10; tolerance++) {
                    const successCount = simulations.filter(s => {
                        if (s.failed && s.failureType === 'depletion') return false;
                        const totalStressYears = s.stressPeriods.reduce((sum, sp) => sum + sp.duration, 0);
                        return totalStressYears <= tolerance;
                    }).length;
                    toleranceSuccessRates.push({ tolerance, successRate: (successCount / numSims) * 100, successCount });
                }

                const allExtraWithdrawn = allStressPeriods.map(sp => sp.totalExtraWithdrawn).sort((a, b) => a - b);
                const extraWithdrawalAnalysis = {
                    avgExtra: allExtraWithdrawn.length > 0 ? allExtraWithdrawn.reduce((a, b) => a + b, 0) / allExtraWithdrawn.length : 0,
                    medianExtra: allExtraWithdrawn.length > 0 ? allExtraWithdrawn[Math.floor(allExtraWithdrawn.length / 2)] : 0,
                    maxExtra: allExtraWithdrawn.length > 0 ? Math.max(...allExtraWithdrawn) : 0,
                    impactTable: []
                };
                const simTotalExtra = simulations.map(s => s.stressPeriods.reduce((sum, sp) => sum + sp.totalExtraWithdrawn, 0)).sort((a, b) => a - b);
                [50, 60, 70, 80, 90, 95, 99].forEach(p => {
                    extraWithdrawalAnalysis.impactTable.push({ percentile: p, extraWithdrawn: simTotalExtra[Math.floor(numSims * p / 100)] || 0 });
                });

                const recoveredPeriods = allStressPeriods.filter(sp => sp.recovered);
                const unrecoveredPeriods = allStressPeriods.filter(sp => !sp.recovered);
                const recoveryAnalysis = {
                    totalPeriods: allStressPeriods.length,
                    recoveredCount: recoveredPeriods.length,
                    unrecoveredCount: unrecoveredPeriods.length,
                    recoveryRate: allStressPeriods.length > 0 ? (recoveredPeriods.length / allStressPeriods.length) * 100 : 100,
                    avgRecoveryTime: recoveredPeriods.length > 0 ? recoveredPeriods.reduce((sum, sp) => sum + sp.duration, 0) / recoveredPeriods.length : 0,
                    recoveryTimeDistribution: {}
                };
                recoveredPeriods.forEach(sp => { recoveryAnalysis.recoveryTimeDistribution[sp.duration] = (recoveryAnalysis.recoveryTimeDistribution[sp.duration] || 0) + 1; });

                const stressByStartYear = {};
                allStressPeriods.forEach(sp => { stressByStartYear[sp.startYear] = (stressByStartYear[sp.startYear] || 0) + 1; });
                const totalStressYearsPerSim = simulations.map(s => s.yearlyStressData.filter(y => y.minimumEnforced).length);
                const avgStressYearsPerSim = totalStressYearsPerSim.reduce((a, b) => a + b, 0) / numSims;

                const survived = simulations.filter(s => !s.failed).length;
                const survivalRate = (survived / numSims) * 100;
                const failedByDepletion = simulations.filter(s => s.failed && s.failureType === 'depletion').length;
                const allMinWithdrawals = simulations.map(s => Math.min(...s.withdrawalBRL.filter(w => w > 0))).filter(w => w > 0 && isFinite(w));
                const worstWithdrawal = allMinWithdrawals.length > 0 ? Math.min(...allMinWithdrawals) : 0;
                const finalPortfolios = simulations.map(s => s.portfolioBRL[s.portfolioBRL.length - 1]).sort((a, b) => a - b);
                const medianFinal = finalPortfolios[Math.floor(numSims * 0.5)];
                const bestFinal = finalPortfolios[numSims - 1];
                const allWithdrawals = simulations.flatMap(s => s.withdrawalBRL.filter(w => w > 0)).sort((a, b) => a - b);
                const overallMeanWithdrawal = allWithdrawals.length > 0 ? allWithdrawals.reduce((a, b) => a + b, 0) / allWithdrawals.length : 0;
                const overallMedianWithdrawal = allWithdrawals.length > 0 ? allWithdrawals[Math.floor(allWithdrawals.length / 2)] : 0;
                const earlyYears = Math.floor(years / 3);
                const midYears = Math.floor(2 * years / 3);
                const earlyWithdrawals = simulations.flatMap(s => s.withdrawalBRL.slice(0, earlyYears).filter(w => w > 0));
                const midWithdrawals = simulations.flatMap(s => s.withdrawalBRL.slice(earlyYears, midYears).filter(w => w > 0));
                const lateWithdrawals = simulations.flatMap(s => s.withdrawalBRL.slice(midYears).filter(w => w > 0));
                const periodStats = {
                    early: { mean: earlyWithdrawals.length > 0 ? earlyWithdrawals.reduce((a,b)=>a+b,0)/earlyWithdrawals.length : 0, median: earlyWithdrawals.length > 0 ? earlyWithdrawals.sort((a,b)=>a-b)[Math.floor(earlyWithdrawals.length/2)] : 0 },
                    mid:   { mean: midWithdrawals.length > 0 ? midWithdrawals.reduce((a,b)=>a+b,0)/midWithdrawals.length : 0,   median: midWithdrawals.length > 0 ? midWithdrawals.sort((a,b)=>a-b)[Math.floor(midWithdrawals.length/2)] : 0 },
                    late:  { mean: lateWithdrawals.length > 0 ? lateWithdrawals.reduce((a,b)=>a+b,0)/lateWithdrawals.length : 0, median: lateWithdrawals.length > 0 ? lateWithdrawals.sort((a,b)=>a-b)[Math.floor(lateWithdrawals.length/2)] : 0 }
                };
                const failures = simulations.filter(s => s.failed);
                const failureCauses = {};
                failures.forEach(f => { if (f.failureCause) f.failureCause.forEach(c => { failureCauses[c] = (failureCauses[c] || 0) + 1; }); });
                const avgFailureYear = failures.length > 0 ? failures.reduce((sum, f) => sum + f.failureYear, 0) / failures.length : null;
                const ruleStats = { preservation: 0, prosperity: 0, inflationSkip: 0 };
                simulations.forEach(s => { s.rulesApplied.forEach(rule => { if (rule === 'preservation') ruleStats.preservation++; if (rule === 'prosperity') ruleStats.prosperity++; if (rule === 'inflation_skip') ruleStats.inflationSkip++; }); });

                return {
                    portfolioPercentiles: percentiles, withdrawalPercentiles, withdrawalMeans, withdrawalMedians,
                    recommendedWithdrawalMeans, stressChartData, survivalRate, failedByDepletion, worstWithdrawal,
                    overallMeanWithdrawal, overallMedianWithdrawal, periodStats, medianFinalPortfolio: medianFinal,
                    bestFinalPortfolio: bestFinal, failureCauses, avgFailureYear, ruleStats,
                    totalSimulations: numSims, failedSimulations: failures.length,
                    stressAnalysis: { duration: durationAnalysis, tolerance: toleranceSuccessRates, extraWithdrawal: extraWithdrawalAnalysis, recovery: recoveryAnalysis, stressByStartYear, avgStressYearsPerSim }
                };
            }

            // ============================================
            // ENDOWMENT-SPECIFIC METHODS
            // ============================================

            generateCAPE(currentCAPE) {
                const { medianCAPE, capeVolatility, capeMeanReversionSpeed } = this.params;
                const shock = this.randomNormal(0, capeVolatility);
                const meanReversion = capeMeanReversionSpeed * (medianCAPE - currentCAPE);
                return Math.max(7, Math.min(50, currentCAPE + meanReversion + shock));
            }

            runSimulationEndowment() {
                const {
                    initialPortfolioUSD, initialFX, years,
                    equityReturn, equityVolatility, targetBondPercent,
                    endowmentAlpha, endowmentTargetRate,
                    useEndowmentCAPE, initialCAPE, medianCAPE,
                    endowmentDrawdownSensitivity, endowmentGuardrailCap
                } = this.params;

                let portfolioUSD = initialPortfolioUSD;
                let currentFX = initialFX;
                const bondAllocation = (targetBondPercent || 40) / 100;
                let currentWithdrawalUSD = initialPortfolioUSD * ((endowmentTargetRate || 4) / 100);
                let peakPortfolioUSD = initialPortfolioUSD;
                let currentCAPE = initialCAPE || 22;

                const history = {
                    portfolioUSD: [portfolioUSD],
                    portfolioBRL: [portfolioUSD * currentFX],
                    withdrawalBRL: [currentWithdrawalUSD * currentFX],
                    withdrawalUSD: [currentWithdrawalUSD],
                    recommendedWithdrawalBRL: [currentWithdrawalUSD * currentFX],
                    fxRate: [currentFX],
                    bondAllocation: [bondAllocation * 100],
                    rulesApplied: [null],
                    minimumEnforced: [false],
                    failed: false, failureYear: null, failureType: null, failureCause: null,
                    stressPeriods: [],
                    yearlyStressData: [{ minimumEnforced: false, extraWithdrawn: 0, percentExtra: 0 }],
                    withdrawalSource: ['initial'],
                    capeHistory: [currentCAPE],
                    drawdownHistory: [0]
                };

                for (let year = 1; year <= years; year++) {
                    if (history.failed) {
                        history.portfolioUSD.push(0); history.portfolioBRL.push(0);
                        history.withdrawalBRL.push(0); history.withdrawalUSD.push(0);
                        history.recommendedWithdrawalBRL.push(0);
                        history.fxRate.push(currentFX); history.bondAllocation.push(0);
                        history.rulesApplied.push(null); history.minimumEnforced.push(false);
                        history.yearlyStressData.push({ minimumEnforced: false, extraWithdrawn: 0, percentExtra: 0 });
                        history.withdrawalSource.push('none');
                        history.capeHistory.push(currentCAPE); history.drawdownHistory.push(0);
                        continue;
                    }

                    const equityReturnYear = this.generateReturn(equityReturn / 100, equityVolatility / 100);
                    const ipcaYear = this.generateIPCA(equityReturnYear);
                    const bondReturnYear = this.generateBondReturn(ipcaYear);
                    currentFX = this.simulateCurrency(equityReturnYear, currentFX);

                    const portfolioReturn = (1 - bondAllocation) * equityReturnYear + bondAllocation * bondReturnYear;
                    portfolioUSD *= (1 + portfolioReturn);
                    if (portfolioUSD > peakPortfolioUSD) peakPortfolioUSD = portfolioUSD;

                    if (useEndowmentCAPE) currentCAPE = this.generateCAPE(currentCAPE);

                    const alpha = endowmentAlpha || 0.70;
                    const targetRate = (endowmentTargetRate || 4) / 100;
                    let newWithdrawalUSD;

                    if (useEndowmentCAPE) {
                        const drawdown = Math.max(0, 1 - portfolioUSD / peakPortfolioUSD);
                        const med = medianCAPE || 20;
                        const xT = targetRate * (med / currentCAPE) * (1 - drawdown * (endowmentDrawdownSensitivity || 0.5));
                        const raw = alpha * currentWithdrawalUSD + (1 - alpha) * xT * portfolioUSD;
                        const cap = endowmentGuardrailCap || 0.15;
                        newWithdrawalUSD = Math.max(currentWithdrawalUSD * (1 - cap), Math.min(currentWithdrawalUSD * (1 + cap), raw));
                    } else {
                        newWithdrawalUSD = alpha * currentWithdrawalUSD + (1 - alpha) * targetRate * portfolioUSD;
                    }

                    // Enforce minimum withdrawal floor (like main app)
                    const { useMinimumWithdrawal, minimumWithdrawalBRL } = this.params;
                    const minimumWithdrawalUSD = useMinimumWithdrawal && minimumWithdrawalBRL > 0
                        ? minimumWithdrawalBRL / currentFX
                        : 0;
                    const actualWithdrawalUSD = Math.max(newWithdrawalUSD, minimumWithdrawalUSD);
                    const minimumWasEnforced = useMinimumWithdrawal && minimumWithdrawalBRL > 0
                        && actualWithdrawalUSD > newWithdrawalUSD * 1.001;

                    const gainRatio = Math.min(0.6, year * 0.06);
                    const taxPaid = this.calculateTax(actualWithdrawalUSD, gainRatio, bondAllocation);
                    portfolioUSD -= (actualWithdrawalUSD + taxPaid);
                    // Formula continues from endowment result (not forced minimum)
                    currentWithdrawalUSD = newWithdrawalUSD;

                    const drawdown = Math.max(0, 1 - Math.max(0, portfolioUSD) / peakPortfolioUSD);
                    const withdrawalBRL = actualWithdrawalUSD * currentFX;
                    const portfolioBRL = Math.max(0, portfolioUSD) * currentFX;

                    if (portfolioUSD <= 0) {
                        history.failed = true; history.failureYear = year;
                        history.failureType = 'depletion'; history.failureCause = ['Depleção do portfólio'];
                        portfolioUSD = 0;
                    }

                    history.portfolioUSD.push(portfolioUSD); history.portfolioBRL.push(portfolioBRL);
                    history.withdrawalBRL.push(withdrawalBRL); history.withdrawalUSD.push(actualWithdrawalUSD);
                    history.recommendedWithdrawalBRL.push(newWithdrawalUSD * currentFX);
                    history.fxRate.push(currentFX); history.bondAllocation.push(bondAllocation * 100);
                    history.rulesApplied.push(null); history.minimumEnforced.push(minimumWasEnforced);
                    const extraWithdrawnBRL = minimumWasEnforced ? (actualWithdrawalUSD - newWithdrawalUSD) * currentFX : 0;
                    const percentExtra = minimumWasEnforced && newWithdrawalUSD > 0 ? ((actualWithdrawalUSD - newWithdrawalUSD) / newWithdrawalUSD) * 100 : 0;
                    history.yearlyStressData.push({ minimumEnforced: minimumWasEnforced, extraWithdrawn: extraWithdrawnBRL, percentExtra });
                    history.withdrawalSource.push('endowment');
                    history.capeHistory.push(currentCAPE); history.drawdownHistory.push(drawdown);
                }
                return history;
            }

            computeComparisonMetrics(endowmentSims, fixedSims, gkSims) {
                const numSims = endowmentSims.length;
                const years = this.params.years;
                const medianOf = (arr) => { const s = [...arr].filter(v => v > 0).sort((a,b) => a-b); return s.length > 0 ? s[Math.floor(s.length/2)] : 0; };

                const survivalRates = {
                    endowment: (endowmentSims.filter(s => !s.failed).length / numSims) * 100,
                    fixed: (fixedSims.filter(s => !s.failed).length / numSims) * 100,
                    gk: (gkSims.filter(s => !s.failed).length / numSims) * 100
                };
                const withdrawalAtYear = {};
                [5, 10, 20, 30].forEach(yr => {
                    if (yr <= years) {
                        withdrawalAtYear[`y${yr}`] = {
                            endowment: medianOf(endowmentSims.map(s => s.withdrawalBRL[yr] || 0)),
                            fixed: medianOf(fixedSims.map(s => s.withdrawalBRL[yr] || 0)),
                            gk: medianOf(gkSims.map(s => s.withdrawalBRL[yr] || 0))
                        };
                    }
                });
                const getTerminalMedian = (sims) => { const v = sims.map(s => s.portfolioBRL[years] || 0).sort((a,b)=>a-b); return v[Math.floor(v.length/2)] || 0; };
                const getTerminalP10 = (sims) => { const v = sims.map(s => s.portfolioBRL[years] || 0).sort((a,b)=>a-b); return v[Math.floor(v.length*0.10)] || 0; };
                const getCV = (sims) => { const a = sims.flatMap(s => s.withdrawalBRL.filter(w => w > 0)); if (!a.length) return 0; const m = a.reduce((x,y)=>x+y,0)/a.length; return m > 0 ? Math.sqrt(a.reduce((x,y)=>x+(y-m)**2,0)/a.length)/m : 0; };
                const getWorst = (sims) => { const m = sims.map(s => { const v = s.withdrawalBRL.filter(w=>w>0); return v.length > 0 ? Math.min(...v) : 0; }).filter(w=>w>0); return m.length > 0 ? Math.min(...m) : 0; };

                return {
                    survivalRates,
                    withdrawalAtYear,
                    terminalPortfolio: { endowment: getTerminalMedian(endowmentSims), fixed: getTerminalMedian(fixedSims), gk: getTerminalMedian(gkSims) },
                    terminalPortfolioP10: { endowment: getTerminalP10(endowmentSims), fixed: getTerminalP10(fixedSims), gk: getTerminalP10(gkSims) },
                    withdrawalVolatility: { endowment: getCV(endowmentSims), fixed: getCV(fixedSims), gk: getCV(gkSims) },
                    worstWithdrawal: { endowment: getWorst(endowmentSims), fixed: getWorst(fixedSims), gk: getWorst(gkSims) }
                };
            }

            runMonteCarloComparison(iterations) {
                const masterSeed = this.initialSeed;
                const endowmentSims = [], fixedSims = [], gkSims = [];

                const baseCompareParams = {
                    ...this.params,
                    initialPortfolioBRL: 0,
                    useBucketStrategy: false,
                    inflation: this.params.expectedIPCA,
                    withdrawalRate: this.params.endowmentTargetRate,
                    tentInitialBondPercent: this.params.targetBondPercent,
                    tentDuration: this.params.years,
                    useSequenceConstraint: false
                };

                for (let i = 0; i < iterations; i++) {
                    const iterSeed = (masterSeed + i * 1000003) >>> 0;
                    endowmentSims.push(new MonteCarloEngine({ ...this.params, seed: iterSeed }).runSimulationEndowment());
                    fixedSims.push(new MonteCarloEngine({ ...baseCompareParams, seed: iterSeed, useGuytonKlinger: false }).runSimulation());
                    gkSims.push(new MonteCarloEngine({ ...baseCompareParams, seed: iterSeed, useGuytonKlinger: true }).runSimulation());
                }

                const endowmentResults = this.analyzeResults(endowmentSims);
                const fixedResults = this.analyzeResults(fixedSims);
                const gkResults = this.analyzeResults(gkSims);

                const yr10 = Math.min(10, this.params.years);
                const year10Withdrawals = {
                    endowment: endowmentSims.map(s => s.withdrawalBRL[yr10] || 0).filter(w => w > 0),
                    fixed: fixedSims.map(s => s.withdrawalBRL[yr10] || 0).filter(w => w > 0),
                    gk: gkSims.map(s => s.withdrawalBRL[yr10] || 0).filter(w => w > 0)
                };

                const capePercentiles = { p10: [], p50: [], p90: [] };
                for (let yr = 0; yr <= this.params.years; yr++) {
                    const vals = endowmentSims.map(s => (s.capeHistory && s.capeHistory[yr]) || (this.params.initialCAPE || 22)).sort((a,b) => a-b);
                    const n = vals.length;
                    capePercentiles.p10.push(vals[Math.floor(n * 0.10)]);
                    capePercentiles.p50.push(vals[Math.floor(n * 0.50)]);
                    capePercentiles.p90.push(vals[Math.floor(n * 0.90)]);
                }

                return {
                    endowment: endowmentResults, fixed: fixedResults, gk: gkResults,
                    comparisonMetrics: this.computeComparisonMetrics(endowmentSims, fixedSims, gkSims),
                    capePercentiles, year10Withdrawals, seed: masterSeed, years: this.params.years
                };
            }
        }

        // ============================================
        // REACT COMPONENTS — SHARED UTILITIES
        // ============================================

        const SurvivalComparisonBar = ({ metrics }) => {

                        scales: {

        const CAPEEvolutionChart = ({ capePercentiles, years }) => {
            const chartRef = useRef(null);
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!capePercentiles || !canvasRef.current) return;

                const labels = Array.from({ length: years + 1 }, (_, i) => `Ano ${i}`);

                    type: 'line',
                    data: { labels, datasets: [
                        { label: 'Percentil 90', data: capePercentiles.p90, borderColor: 'rgba(139,92,246,0.5)', backgroundColor: 'rgba(139,92,246,0.1)', fill: '+1', tension: 0.3, borderWidth: 1, pointRadius: 0 },
                        { label: 'Mediana CAPE', data: capePercentiles.p50, borderColor: '#8b5cf6', backgroundColor: 'rgba(139,92,246,0.15)', fill: '+1', tension: 0.3, borderWidth: 2, pointRadius: 0 },

                        },
                        scales: {
                            x: { grid: { color: 'rgba(55,65,81,0.3)' }, ticks: { color: '#6b7280', font: { family: 'JetBrains Mono', size: 10 } } },
                            y: { grid: { color: 'rgba(55,65,81,0.3)' }, ticks: { color: '#6b7280', font: { family: 'JetBrains Mono', size: 10 }, callback: (v) => `${v.toFixed(0)}x` } }
                        }
                    }
                });
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [capePercentiles, years]);
            return <div className="chart-container"><canvas ref={canvasRef} /></div>;
        };

        const WithdrawalDistributionChart = ({ year10Withdrawals }) => {
            const chartRef = useRef(null);
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!year10Withdrawals || !canvasRef.current) return;
                if (chartRef.current) chartRef.current.destroy();
                const { endowment, fixed, gk } = year10Withdrawals;
                const allValues = [...endowment, ...fixed, ...gk];
                if (!allValues.length) return;
                const minVal = Math.min(...allValues), maxVal = Math.max(...allValues);
                const numBins = 20, binWidth = (maxVal - minVal) / numBins || 1;
                const buildHist = (vals) => {
                    const bins = Array(numBins).fill(0);
                    vals.forEach(v => { const idx = Math.min(numBins-1, Math.floor((v-minVal)/binWidth)); bins[idx]++; });
                    return bins.map(c => vals.length > 0 ? (c/vals.length)*100 : 0);
                };
                const labels = Array.from({ length: numBins }, (_, i) => `R$ ${((minVal + (i+0.5)*binWidth)/1000).toFixed(0)}k`);
                const ctx = canvasRef.current.getContext('2d');
                chartRef.current = new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [
                        { label: 'Endowment', data: buildHist(endowment), backgroundColor: 'rgba(139,92,246,0.5)', borderColor: '#8b5cf6', borderWidth: 1, borderRadius: 2 },
                        { label: 'SWR Fixo', data: buildHist(fixed), backgroundColor: 'rgba(59,130,246,0.5)', borderColor: '#3b82f6', borderWidth: 1, borderRadius: 2 },
                        { label: 'Guyton-Klinger', data: buildHist(gk), backgroundColor: 'rgba(16,185,129,0.5)', borderColor: '#10b981', borderWidth: 1, borderRadius: 2 }
                    ]},
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true, position: 'top', labels: { color: '#9ca3af', font: { family: 'Outfit', size: 11 }, usePointStyle: true, padding: 15 } },
                            tooltip: { backgroundColor: '#1a2234', titleColor: '#fff', bodyColor: '#9ca3af', borderColor: '#374151', borderWidth: 1, padding: 12, callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw.toFixed(1)}% das simulações` } }
                        },
                        scales: {
                            x: { grid: { display: false }, ticks: { color: '#6b7280', font: { family: 'JetBrains Mono', size: 9 }, maxRotation: 45 } },
                            y: { grid: { color: 'rgba(55,65,81,0.3)' }, ticks: { color: '#6b7280', font: { family: 'JetBrains Mono', size: 10 }, callback: (v) => `${v.toFixed(0)}%` } }
                        }
                    }
                });
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [year10Withdrawals]);
            return <div className="chart-container"><canvas ref={canvasRef} /></div>;
        };

        const ComparisonTable = ({ metrics, formatCurrency, years }) => {
            if (!metrics) return null;
            const { survivalRates, withdrawalAtYear, terminalPortfolio, terminalPortfolioP10, withdrawalVolatility, worstWithdrawal } = metrics;
            const getBest = (row) => ['endowment','fixed','gk'].reduce((a,b) => row[b] > row[a] ? b : a);
            const getWorstKey = (row) => ['endowment','fixed','gk'].reduce((a,b) => row[b] < row[a] ? b : a);
            const cellClass = (key, best, worst) => key === best ? 'text-accent font-semibold' : key === worst ? 'text-danger' : 'text-gray-300';
            const Row = ({ label, row, format, lowerBetter = false }) => {
                const best = lowerBetter ? getWorstKey(row) : getBest(row);
                const worst = lowerBetter ? getBest(row) : getWorstKey(row);
                return (
                    <tr className="border-t border-gray-800">
                        <td className="py-2 px-3 text-xs text-gray-400">{label}</td>
                        <td className={`py-2 px-3 text-xs text-right font-mono ${cellClass('endowment', best, worst)}`}>{format(row.endowment)}</td>
                        <td className={`py-2 px-3 text-xs text-right font-mono ${cellClass('fixed', best, worst)}`}>{format(row.fixed)}</td>
                        <td className={`py-2 px-3 text-xs text-right font-mono ${cellClass('gk', best, worst)}`}>{format(row.gk)}</td>
                    </tr>
                );
            };
            const pct = (v) => `${(v||0).toFixed(1)}%`;
            const cv = (v) => `${((v||0) * 100).toFixed(1)}%`;
            return (
                <div className="bg-surface rounded-xl border border-gray-800 overflow-hidden">
                    <div className="p-4 border-b border-gray-800 flex items-center gap-2">
                        <Icon name="Table" size={18} className="text-purple-400" />
                        <h3 className="font-semibold">Comparação de Métricas</h3>
                        <span className="text-xs text-gray-500 ml-2">Verde = melhor · Vermelho = pior</span>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full">
                            <thead>
                                <tr className="bg-deep">
                                    <th className="py-2 px-3 text-left text-xs text-gray-500 font-medium">Métrica</th>
                                    <th className="py-2 px-3 text-right text-xs text-purple-400 font-medium">Endowment</th>
                                    <th className="py-2 px-3 text-right text-xs text-info font-medium">SWR Fixo</th>
                                    <th className="py-2 px-3 text-right text-xs text-accent font-medium">G-K</th>
                                </tr>
                            </thead>
                            <tbody>
                                <Row label="Taxa de Sobrevivência" row={survivalRates} format={pct} />
                                {withdrawalAtYear && withdrawalAtYear.y5 && <Row label="Saque Mediano — Ano 5" row={withdrawalAtYear.y5} format={formatCurrency} />}
                                {withdrawalAtYear && withdrawalAtYear.y10 && <Row label="Saque Mediano — Ano 10" row={withdrawalAtYear.y10} format={formatCurrency} />}
                                {withdrawalAtYear && withdrawalAtYear.y20 && <Row label="Saque Mediano — Ano 20" row={withdrawalAtYear.y20} format={formatCurrency} />}
                                {withdrawalAtYear && withdrawalAtYear.y30 && years >= 30 && <Row label="Saque Mediano — Ano 30" row={withdrawalAtYear.y30} format={formatCurrency} />}
                                <Row label="Pior Saque (todas as trajetórias)" row={worstWithdrawal} format={formatCurrency} />
                                <Row label="Volatilidade do Saque (CV)" row={withdrawalVolatility} format={cv} lowerBetter={true} />
                                <Row label="Portfólio Final P50" row={terminalPortfolio} format={formatCurrency} />
                                <Row label="Portfólio Final P10" row={terminalPortfolioP10} format={formatCurrency} />
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const EndowmentExplainer = ({ alpha, targetRate, useCape }) => (
            <div className="bg-surface rounded-xl p-5 border border-purple-500/20">
                <div className="flex items-center gap-2 mb-4">
                    <Icon name="GraduationCap" size={20} className="text-purple-400" />
                    <h3 className="font-semibold">Como Funciona o Endowment Pessoal</h3>
                </div>
                <div className="space-y-4 text-sm text-gray-300">
                    <div>
                        <p className="text-purple-300 font-medium mb-2">Fórmula Base (Modo Simples):</p>
                        <div className="bg-deep rounded-lg p-3 font-mono text-xs text-accent border border-gray-700">
                            W(t) = α × W(t-1) + (1-α) × (x × P(t))
                        </div>
                        <div className="mt-2 space-y-1 text-xs text-gray-400">
                            <p>• <strong className="text-gray-300">α = {(alpha||0.7).toFixed(2)}</strong> — peso do saque anterior (suavização)</p>
                            <p>• <strong className="text-gray-300">x = {(targetRate||4).toFixed(1)}%</strong> — taxa-alvo de retirada</p>
                            <p>• <strong className="text-gray-300">P(t)</strong> — valor do portfólio no início do ano t</p>
                        </div>
                    </div>
                    {useCape && (
                        <div>
                            <p className="text-purple-300 font-medium mb-2">Ajuste por CAPE (Modo Avançado):</p>
                            <div className="bg-deep rounded-lg p-3 font-mono text-xs text-warning border border-gray-700">
                                x(t) = x₀ × (CAPE_médio / CAPE_atual) × (1 − drawdown × sens.)
                            </div>
                            <p className="text-xs text-gray-400 mt-2">Quando o mercado está caro (CAPE alto), a taxa de retirada é reduzida automaticamente. Guardrails de ±15% evitam variações abruptas.</p>
                        </div>
                    )}
                    <div className="pt-3 border-t border-gray-700 text-xs text-gray-400">
                        <strong className="text-gray-300">Origem:</strong> Inspirado na estratégia de endowment da Universidade Yale (David Swensen), adaptada para pessoa física brasileira.
                        A suavização (α) evita oscilações abruptas nos saques, garantindo maior previsibilidade de renda mesmo em mercados voláteis.
                    </div>
                </div>
            </div>
        );

        // ============================================
        // MAIN APP
        // ============================================
        const App = () => {
            const [params, setParams] = useState({
                initialPortfolioUSD: 1000000,
                initialPortfolioBRL: 0,
                initialFX: 5.80,
                years: 30,
                iterations: 5000,
                sidebarMode: 'simple',
                // Endowment
                endowmentTargetRate: 4.0,
                endowmentAlpha: 0.70,
                useEndowmentCAPE: false,
                initialCAPE: 22,
                medianCAPE: 20,
                capeVolatility: 4.0,
                capeMeanReversionSpeed: 0.15,
                endowmentDrawdownSensitivity: 0.5,
                endowmentGuardrailCap: 0.15,
                // Market
                equityReturn: 8.0,
                equityVolatility: 18.0,
                bondReturn: 5.0,
                bondVolatility: 2.0,
                targetBondPercent: 40,
                tentInitialBondPercent: 40,
                expectedIPCA: 4.5,
                ipcaVolatility: 2.0,
                realSpread: 5.0,
                // GK comparison
                useGuytonKlinger: true,
                preservationThreshold: 0.20,
                prosperityThreshold: 0.20,
                adjustmentPercent: 0.10,
                applyInflationRule: true,
                // Advanced modeling
                useStudentT: true,
                degreesOfFreedom: 5,
                useDynamicCorrelation: true,
                baseCorrelation: -0.4,
                stressCorrelationMultiplier: 2.0,
                useIPCAModel: true,
                useTaxModel: true,
                equityTaxRate: 15,
                fixedIncomeTaxRate: 15,
                // Engine compat
                inflation: 4.5,
                withdrawalRate: 4.0,
                tentDuration: 30,
                useBucketStrategy: false,
                bucketYears: 0,
                useMinimumWithdrawal: false,
                minimumWithdrawalBRL: 120000,
                useSequenceConstraint: false,
                maxNegativeSequence: 10,
                seed: null,
            });

            const [results, setResults] = useState(null);
            const [isRunning, setIsRunning] = useState(false);

            const updateParam = (key, value) => {
                setParams(prev => {
                    const u = { ...prev, [key]: value };
                    if (key === 'endowmentTargetRate') u.withdrawalRate = value;
                    if (key === 'expectedIPCA') { u.inflation = value; }
                    if (key === 'years') u.tentDuration = value;
                    if (key === 'targetBondPercent') u.tentInitialBondPercent = value;
                    if (key === 'sidebarMode' && value === 'simple') u.useEndowmentCAPE = false;
                    return u;
                });
            };

            const runSimulation = () => {
                setIsRunning(true);
                setTimeout(() => {
                    try {
                        const engine = new MonteCarloEngine(params);
                        const r = engine.runMonteCarloComparison(params.iterations);
                        setResults(r);
                    } catch(e) { console.error(e); }
                    setIsRunning(false);
                }, 50);
            };

            const formatCurrency = (val) => {
                if (!val || isNaN(val)) return 'R$ 0';
                if (Math.abs(val) >= 1000000) return `R$ ${(val/1000000).toFixed(2)}M`;
                if (Math.abs(val) >= 1000) return `R$ ${(val/1000).toFixed(0)}k`;
                return `R$ ${val.toFixed(0)}`;
            };

            return (
                <div className="min-h-screen flex flex-col lg:flex-row">
                    {/* Sidebar */}
                    <aside className="w-full lg:w-80 bg-deep border-b lg:border-b-0 lg:border-r border-gray-800 p-4 lg:p-5 lg:overflow-y-auto">
                        <div className="mb-6">
                            <div className="flex items-center gap-2 mb-1">
                                <Icon name="GraduationCap" size={24} className="text-purple-400" />
                                <h1 className="text-xl font-bold">Yale Endowment</h1>
                            </div>
                            <p className="text-xs text-gray-500">Simulador de Aposentadoria por Endowment</p>
                            <a href="index.html" className="flex items-center gap-1 text-xs text-gray-500 hover:text-accent transition-colors mt-1">
                                <Icon name="ArrowLeft" size={14} />
                                <span>← Voltar ao SWR Clássico</span>
                            </a>
                        </div>

                        <div className="flex bg-midnight rounded-lg p-1 mb-6">
                            {['simple','advanced'].map(mode => (
                                <button key={mode} onClick={() => updateParam('sidebarMode', mode)}
                                    className={`flex-1 py-1.5 px-3 rounded-md text-xs font-medium transition-colors ${params.sidebarMode === mode ? 'bg-purple-600 text-white' : 'text-gray-400 hover:text-gray-200'}`}>
                                    {mode === 'simple' ? 'Simples' : 'Avançado'}
                                </button>
                            ))}
                        </div>

                        {/* Portfolio */}
                        <div className="mb-6">
                            <h2 className="text-sm font-semibold text-gray-300 mb-3 flex items-center gap-2">
                                <Icon name="Wallet" size={16} /> Portfólio
                            </h2>
                            <DualCurrencyInput label="Patrimônio Inicial" valueUSD={params.initialPortfolioUSD} onChangeUSD={(v) => updateParam('initialPortfolioUSD', v)} fx={params.initialFX} tooltip="Valor total do portfólio em USD (ETFs internacionais)." stepUSD={50000} />
                            <Input label="Taxa de Câmbio" value={params.initialFX} onChange={(v) => updateParam('initialFX', v)} unit="BRL/USD" min={2} max={20} step={0.1} tooltip="Taxa de câmbio inicial BRL/USD." />
                            <Input label="Horizonte" value={params.years} onChange={(v) => updateParam('years', Math.round(v))} unit="anos" min={10} max={60} step={1} tooltip="Número de anos da aposentadoria." />
                            <Input label="Simulações" value={params.iterations} onChange={(v) => updateParam('iterations', Math.round(v))} unit="sims" min={500} max={20000} step={500} tooltip="Número de trajetórias Monte Carlo por estratégia. O total de simulações executadas é 3× este valor (uma por estratégia)." />
                        </div>

                        {/* Endowment Parameters */}

                            <Input label="Peso de Suavização (α)" value={params.endowmentAlpha} onChange={(v) => updateParam('endowmentAlpha', v)} unit="" min={0.5} max={0.95} step={0.05} tooltip="Peso do saque anterior. α=0.70 → 70% do saque anterior + 30% do alvo atual. Maior α = mais suave e menos volátil." />
                            <Input label="Alocação em Renda Fixa" value={params.targetBondPercent} onChange={(v) => updateParam('targetBondPercent', v)} unit="%" min={0} max={80} step={5} tooltip="Percentual do portfólio em renda fixa. Mantido constante." />

                            {params.sidebarMode === 'advanced' && (
                                <div className="pt-3 mt-3 border-t border-gray-800">

                                        <>

                                            <Input label="CAPE Mediano (longo prazo)" value={params.medianCAPE} onChange={(v) => updateParam('medianCAPE', v)} unit="x" min={7} max={40} step={1} tooltip="CAPE de reversão à média no longo prazo." />
                                            <Input label="Volatilidade do CAPE" value={params.capeVolatility} onChange={(v) => updateParam('capeVolatility', v)} unit="" min={1} max={10} step={0.5} tooltip="Desvio padrão anual do processo CAPE (Ornstein-Uhlenbeck)." />

                                            <Input label="Sensibilidade ao Drawdown" value={params.endowmentDrawdownSensitivity} onChange={(v) => updateParam('endowmentDrawdownSensitivity', v)} unit="" min={0} max={1} step={0.1} tooltip="Quanto o drawdown reduz a taxa de retirada. 0.5 = drawdown 50% reduz taxa em 25%." />
                                            <Input label="Guardrail (cap ±)" value={params.endowmentGuardrailCap} onChange={(v) => updateParam('endowmentGuardrailCap', v)} unit="" min={0.05} max={0.30} step={0.05} tooltip="Variação máxima do saque ano-a-ano. 0.15 = ±15% máximo." />
                                        </>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Minimum Withdrawal */}
                        <div className="mb-6">
                            <h2 className="text-sm font-semibold text-gray-300 mb-3 flex items-center gap-2">
                                <Icon name="ArrowDownToLine" size={16} /> Saque Mínimo
                            </h2>
                            <Toggle label="Usar Saque Mínimo" checked={params.useMinimumWithdrawal} onChange={(v) => updateParam('useMinimumWithdrawal', v)} />
                            {params.useMinimumWithdrawal && (
                                <Input
                                    label="Saque Mínimo Anual"
                                    value={params.minimumWithdrawalBRL}
                                    onChange={(v) => updateParam('minimumWithdrawalBRL', v)}
                                    unit="BRL"
                                    min={0}
                                    step={10000}
                                    tooltip="Valor mínimo de saque anual em BRL. Quando a fórmula Endowment sugerir um valor abaixo deste, o mínimo é forçado — o que acelera a depleção do portfólio em cenários adversos. O portfólio USD equivale a esse valor dividido pela taxa de câmbio."
                                />
                            )}
                        </div>

                        {/* Advanced Market Assumptions */}
                        {params.sidebarMode === 'advanced' && (
                            <div className="mb-6">
                                <h2 className="text-sm font-semibold text-gray-300 mb-3 flex items-center gap-2">
                                    <Icon name="BarChart2" size={16} /> Premissas de Mercado
                                </h2>
                                <Input label="Retorno Médio Equity" value={params.equityReturn} onChange={(v) => updateParam('equityReturn', v)} unit="%" min={-5} max={20} step={0.5} tooltip="Retorno médio anual esperado para ETFs de renda variável." />
                                <Input label="Volatilidade Equity" value={params.equityVolatility} onChange={(v) => updateParam('equityVolatility', v)} unit="%" min={5} max={40} step={1} tooltip="Desvio padrão anual dos retornos de equity." />
                                <Input label="IPCA Esperado" value={params.expectedIPCA} onChange={(v) => updateParam('expectedIPCA', v)} unit="%" min={1} max={15} step={0.5} tooltip="Inflação brasileira esperada (IPCA)." />
                                <Input label="Spread Real (RF)" value={params.realSpread} onChange={(v) => updateParam('realSpread', v)} unit="%" min={0} max={10} step={0.5} tooltip="Prêmio real acima do IPCA para renda fixa." />
                                <Toggle label="Caudas Gordas (T-Student)" checked={params.useStudentT} onChange={(v) => updateParam('useStudentT', v)} />
                                <Toggle label="Correlação Dinâmica USD/BRL" checked={params.useDynamicCorrelation} onChange={(v) => updateParam('useDynamicCorrelation', v)} />
                                <Toggle label="Modelo IPCA Correlacionado" checked={params.useIPCAModel} onChange={(v) => updateParam('useIPCAModel', v)} />
                                <Toggle label="Modelo de Impostos" checked={params.useTaxModel} onChange={(v) => updateParam('useTaxModel', v)} />
                            </div>
                        )}

                        <button onClick={runSimulation} disabled={isRunning}
                            className={`w-full py-3 px-4 rounded-xl font-semibold text-sm transition-all flex items-center justify-center gap-2 ${isRunning ? 'bg-gray-700 text-gray-400 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-500 text-white shadow-lg'}`}>
                            {isRunning ? (
                                <><span className="pulse-slow inline-block">⟳</span> Simulando {params.iterations.toLocaleString()} × 3...</>
                            ) : (
                                <><Icon name="Play" size={16} /> Comparar {params.iterations.toLocaleString()} Trajetórias</>
                            )}
                        </button>

                        {results && (
                            <div className="mt-4 p-3 bg-midnight rounded-lg border border-purple-500/20 text-xs space-y-1">
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Seed:</span>
                                    <span className="font-mono text-gray-400">{results.seed}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Portfólio inicial:</span>
                                    <span className="font-mono text-gray-400">{formatCurrency(params.initialPortfolioUSD * params.initialFX)}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-gray-500">Saque inicial:</span>
                                    <span className="font-mono text-purple-400">{formatCurrency(params.initialPortfolioUSD * (params.endowmentTargetRate / 100) * params.initialFX)}/ano</span>
                                </div>
                            </div>
                        )}
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-4 lg:p-6 lg:overflow-y-auto">
                        {!results ? (
                            <div className="flex justify-center pt-10">
                                <div className="text-center max-w-md">
                                    <div className="w-20 h-20 mx-auto mb-6 rounded-2xl flex items-center justify-center bg-purple-500/20">
                                        <Icon name="GraduationCap" size={40} className="text-purple-400" />
                                    </div>
                                    <h2 className="text-2xl font-bold mb-3">Endowment Pessoal</h2>
                                    <p className="text-gray-400 mb-6">
                                        Compare a estratégia <strong className="text-purple-400">Yale Endowment</strong> com SWR Fixo 4% e Guyton-Klinger.
                                        Configure os parâmetros e clique em <strong className="text-purple-400">"Comparar Trajetórias"</strong>.
                                    </p>
                                    <div className="grid grid-cols-2 gap-3 text-left">
                                        {[
                                            { icon: 'Waves', title: 'Suavização α', sub: 'Saque adaptativo e estável' },
                                            { icon: 'BarChart2', title: 'CAPE Ajustado', sub: 'Valuation dinâmico (avançado)' },
                                            { icon: 'GitCompare', title: '3 Estratégias', sub: 'Comparação direta' },
                                            { icon: 'TrendingDown', title: 'Guardrails', sub: 'Variação limitada ±15%' },
                                        ].map(({ icon, title, sub }) => (
                                            <div key={title} className="p-3 bg-surface rounded-lg border border-purple-500/20">
                                                <Icon name={icon} size={18} className="text-purple-400 mb-2" />
                                                <div className="text-sm font-medium">{title}</div>
                                                <div className="text-xs text-gray-500">{sub}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 fade-in">
                                {/* Stat Cards */}
                                <div className="grid grid-cols-3 gap-4">
                                    <StatCard title="Endowment" value={results.endowment.survivalRate.toFixed(1)} unit="% sobrevivência" icon="GraduationCap" color="purple" subtitle={`${results.endowment.totalSimulations} simulações`} />
                                    <StatCard title="SWR Fixo 4%" value={results.fixed.survivalRate.toFixed(1)} unit="% sobrevivência" icon="Minus" color="info" subtitle="Inflação-ajustado" />
                                    <StatCard title="Guyton-Klinger" value={results.gk.survivalRate.toFixed(1)} unit="% sobrevivência" icon="ArrowUpDown" color="warning" subtitle="Com regras GK" />
                                </div>

                                {/* Survival Bar Chart */}
                                <div className="bg-surface rounded-xl p-4 border border-gray-800">
                                    <div className="flex items-center gap-2 mb-4">
                                        <Icon name="BarChart2" size={18} className="text-purple-400" />
                                        <h3 className="font-semibold">Taxa de Sobrevivência por Estratégia</h3>
                                    </div>
                                    <SurvivalComparisonBar metrics={results.comparisonMetrics} />
                                </div>

                                {/* Comparison Table */}
                                <ComparisonTable metrics={results.comparisonMetrics} formatCurrency={formatCurrency} years={params.years} />

                                {/* Withdrawal Evolution */}
                                <div className="bg-surface rounded-xl p-4 border border-gray-800">
                                    <div className="flex items-center gap-2 mb-4">
                                        <Icon name="TrendingUp" size={18} className="text-purple-400" />
                                        <h3 className="font-semibold">Evolução do Saque Mediano (BRL/ano)</h3>
                                    </div>
                                    <ComparisonLineChart endowment={results.endowment} fixed={results.fixed} gk={results.gk} years={params.years} />
                                </div>

                                {/* Portfolio Fan Chart — Endowment */}
                                <div className="bg-surface rounded-xl p-4 border border-gray-800">
                                    <div className="flex items-center gap-2 mb-4">
                                        <Icon name="GraduationCap" size={18} className="text-purple-400" />
                                        <h3 className="font-semibold">Evolução do Portfólio — Estratégia Endowment</h3>
                                    </div>
                                    <PortfolioChart data={results.endowment.portfolioPercentiles} years={params.years} />
                                </div>

                                {/* CAPE Evolution (advanced mode only) */}
                                {params.useEndowmentCAPE && results.capePercentiles && (
                                    <div className="bg-surface rounded-xl p-4 border border-purple-500/20">
                                        <div className="flex items-center gap-2 mb-4">
                                            <Icon name="Activity" size={18} className="text-purple-400" />
                                            <h3 className="font-semibold">Evolução do CAPE — Fan Chart (P10/P50/P90)</h3>
                                        </div>
                                        <CAPEEvolutionChart capePercentiles={results.capePercentiles} years={params.years} />
                                        <p className="text-xs text-gray-500 mt-3">Trajetórias do índice CAPE ao longo do horizonte de aposentadoria, com reversão à média de {params.medianCAPE}x.</p>
                                    </div>
                                )}

                                {/* Year-10 Distribution */}
                                {results.year10Withdrawals && (
                                    <div className="bg-surface rounded-xl p-4 border border-gray-800">
                                        <div className="flex items-center gap-2 mb-4">
                                            <Icon name="PieChart" size={18} className="text-purple-400" />
                                            <h3 className="font-semibold">Distribuição do Saque no Ano 10</h3>
                                        </div>
                                        <p className="text-xs text-gray-500 mb-4">Histograma de frequência dos saques anuais no ano 10 por estratégia.</p>
                                        <WithdrawalDistributionChart year10Withdrawals={results.year10Withdrawals} />
                                    </div>
                                )}

                                {/* Explainer */}
                                <EndowmentExplainer alpha={params.endowmentAlpha} targetRate={params.endowmentTargetRate} useCape={params.useEndowmentCAPE} />
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
